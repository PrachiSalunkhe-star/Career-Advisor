 <div id="authArea">

<h2 class="title">Detailed Career Information</h2>

<!-- ===== CAREER GRID ===== -->
<div class="career-container" id="careerContainer"></div>


<!-- ===== MODAL ===== -->
<div class="modal" id="careerModal">
  <div class="modal-content">

    <span class="close" onclick="closeModal()">×</span>

    <h2 id="modalTitle"></h2>

    <div class="modal-body">

      <img id="modalImage">

      <div class="modal-info">

        <h3>Required Courses</h3>
        <ul id="modalCourses"></ul>

        <h3>Key Skills</h3>
        <div id="modalSkills" class="skills"></div>

        <h3>Industries</h3>
        <ul id="modalIndustries"></ul>

      </div>
    </div>

    <div class="modal-buttons">
      <button onclick="goToColleges()" class="primary">
  Find  Colleges
</button>
       <button id="aptitudeBtn" class="secondary"> Take Aptitude Test</button>
    </div>

  </div>
</div>
